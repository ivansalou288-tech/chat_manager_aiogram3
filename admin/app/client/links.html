<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание ссылок</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #b388ff;
            text-shadow: 0 0 20px #b388ff, 0 0 40px #7c4dff;
            margin-bottom: 50px;
            font-size: 2.5em;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .form-section {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 2px solid #7c4dff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(124, 77, 255, 0.3);
        }
        .selector-group {
            margin-bottom: 20px;
        }
        .selector-label {
            display: block;
            margin-bottom: 10px;
            color: #b388ff;
            font-size: 1.1em;
        }
        .selector-buttons {
            position: relative;
            display: flex;
            background: #1a1a2e;
            border: 2px solid #7c4dff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(124, 77, 255, 0.2);
        }
        .selector-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            transition: color 0.3s ease;
            position: relative;
            z-index: 1;
        }
        .selector-btn:hover {
            color: #b388ff;
        }
        .selector-btn.active {
            color: #050510;
        }
        .selector-slider {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            border-radius: 8px;
            transition: transform 0.3s ease;
            z-index: 0;
        }
        .btn {
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            border: 2px solid #b388ff;
            color: #fff;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(124, 77, 255, 0.4);
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(124, 77, 255, 0.7);
        }
        .result-section {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 2px solid #7c4dff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(124, 77, 255, 0.3);
            display: none;
        }
        .link-display {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .link-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #7c4dff;
            border-radius: 8px;
            background: #0a0a0a;
            color: #fff;
            font-size: 1em;
            box-shadow: 0 0 10px rgba(124, 77, 255, 0.2);
        }
        .copy-btn {
            padding: 12px 20px;
            border: 2px solid #b388ff;
            border-radius: 8px;
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: #fff;
            cursor: pointer;
            font-size: 1em;
            box-shadow: 0 0 10px rgba(124, 77, 255, 0.4);
            transition: all 0.3s ease;
        }
        .copy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(179, 136, 255, 0.7);
        }
        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 1.1em;
        }
        .status.error {
            color: #ff5252;
        }
        .status.success {
            color: #81c784;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            border: 2px solid #b388ff;
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(124, 77, 255, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(124, 77, 255, 0.7);
        }

        /* Стили профиля пользователя */
        .user-profile {
            position: fixed;
            top: 20px;
            right: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
        }

        .user-name-profile {
            color: #fff;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .user-profile {
                top: 10px;
                right: 10px;
                padding: 6px 10px;
                gap: 8px;
            }

            .user-avatar {
                width: 30px;
                height: 30px;
            }

            .user-name-profile {
                font-size: 0.8em;
                max-width: 100px;
            }
        }
    </style>
</head>
<body>
    <!-- Профиль пользователя -->
    <div id="userProfile" class="user-profile">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div id="userName" class="user-name-profile"></div>
    </div>

    <a href="index.html" class="back-btn">←</a>
    <h1>Создание ссылок</h1>
    <div class="container">
        <div class="form-section">
            <div class="selector-group">
                <div class="selector-label">Выберите состав:</div>
                <div class="selector-buttons" id="sost-buttons">
                    <button class="selector-btn active" data-value="1">1 состав</button>
                    <button class="selector-btn" data-value="2">2 состав</button>
                    <div class="selector-slider" id="sost-slider" style="width: 50%;"></div>
                </div>
            </div>
            <div class="selector-group">
                <div class="selector-label">Количество человек:</div>
                <div class="selector-buttons" id="people-buttons">
                    <button class="selector-btn active" data-value="1">1</button>
                    <button class="selector-btn" data-value="2">2</button>
                    <button class="selector-btn" data-value="3">3</button>
                    <div class="selector-slider" id="people-slider" style="width: 33.33%;"></div>
                </div>
            </div>
            <button class="btn" id="create-btn">Создать</button>
            <div class="status" id="status"></div>
        </div>
        <div class="result-section" id="result-section">
            <h2 style="color: #b388ff; margin-bottom: 20px;">Ссылка создана</h2>
            <div class="link-display">
                <input type="text" class="link-input" id="link-input" readonly>
                <button class="copy-btn" id="copy-btn">Копировать</button>
            </div>
            <div id="link-info"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        let selectedSost = 1;
        let selectedActivateCount = 1;
        let lastCreatedLink = null;

        let currentUser = null;

        function getCurrentUser() {
            if (currentUser) return currentUser;
            const tgLocal = window.Telegram?.WebApp;
            if (tgLocal && tgLocal.initDataUnsafe && tgLocal.initDataUnsafe.user) {
                currentUser = {
                    id: tgLocal.initDataUnsafe.user.id,
                    first_name: tgLocal.initDataUnsafe.user.first_name,
                    last_name: tgLocal.initDataUnsafe.user.last_name || '',
                    username: tgLocal.initDataUnsafe.user.username || '',
                    photo_url: tgLocal.initDataUnsafe.user.photo_url || ''
                };
            }
            return currentUser;
        }

        function updateUserProfile() {
            const user = getCurrentUser();
            if (!user) return;

            const profile = document.getElementById('userProfile');
            const avatar = document.getElementById('userAvatar');
            const name = document.getElementById('userName');

            const displayName = `${user.first_name} ${user.last_name}`.trim() || user.username;
            name.textContent = displayName;

            if (user.photo_url) {
                avatar.src = user.photo_url;
                avatar.style.display = 'block';
            } else {
                avatar.style.display = 'none';
            }

            profile.style.display = 'flex';
        }

        function setupSelector(buttonsId, sliderId, initialValue, callback) {
            const buttons = document.querySelectorAll(`#${buttonsId} .selector-btn`);
            const slider = document.getElementById(sliderId);
            const totalButtons = buttons.length;
            const sliderWidth = 100 / totalButtons;

            slider.style.width = `${sliderWidth}%`;

            buttons.forEach((btn, index) => {
                btn.addEventListener('click', () => {
                    // Remove active from all
                    buttons.forEach(b => b.classList.remove('active'));
                    // Add active to clicked
                    btn.classList.add('active');
                    // Move slider
                    slider.style.transform = `translateX(${index * 100}%)`;
                    // Update selected value
                    callback(parseInt(btn.dataset.value));
                });
            });
        }

        setupSelector('sost-buttons', 'sost-slider', 1, (value) => { selectedSost = value; });
        setupSelector('people-buttons', 'people-slider', 1, (value) => { selectedActivateCount = value; });

        function initTelegramMiniApp() {
            if (!tg) return;

            try {
                tg.ready();
                tg.expand();
                if (tg.setHeaderColor) tg.setHeaderColor('#0a0a0a');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#0a0a0a');

                if (tg.BackButton) {
                    tg.BackButton.show();
                    tg.BackButton.onClick(() => {
                        const backBtn = document.querySelector('.back-btn');
                        if (backBtn) backBtn.click();
                    });
                }

                if (tg.MainButton) {
                    tg.MainButton.setText('Отправить ссылку в админ-бот');
                    tg.MainButton.hide();
                    tg.MainButton.onClick(() => {
                        if (!lastCreatedLink) return;
                        
                        // Визуальная индикация отправки
                        const originalText = tg.MainButton.text;
                        tg.MainButton.setText('Отправка...');
                        tg.MainButton.disable();
                        
                        // Отправляем запрос на сервер для отправки ссылки в бота
                        fetch('https://ezh-dev.ru:8000/send-link-to-bot', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                link: lastCreatedLink,
                                sost: selectedSost,
                                activate_count: selectedActivateCount,
                                admin_id: getCurrentUser()?.id,
                                admin_name: `${getCurrentUser()?.first_name || ''} ${getCurrentUser()?.last_name || ''}`.trim() || (getCurrentUser()?.username || ''),
                                admin_username: getCurrentUser()?.username
                            })
                        })
                        .then(response => response.json())
                        .then(data => {
                            if (data.status === 'ok') {
                                tg.MainButton.setText('✓ Отправлено');
                                setTimeout(() => {
                                    tg.MainButton.setText(originalText);
                                    tg.MainButton.enable();
                                }, 1500);
                            } else {
                                throw new Error(data.error || 'Ошибка отправки');
                            }
                        })
                        .catch(error => {
                            console.error('Error sending link:', error);
                            // Fallback: копируем ссылку в буфер обмена
                            if (tg?.Clipboard?.writeText) {
                                tg.Clipboard.writeText(lastCreatedLink);
                                tg.showPopup({ message: 'Ссылка скопирована в буфер обмена!' });
                            } else {
                                navigator.clipboard.writeText(lastCreatedLink).then(() => {
                                    alert('Ссылка скопирована в буфер обмена!');
                                }).catch(() => {
                                    alert('Не удалось скопировать ссылку');
                                });
                            }
                            tg.MainButton.setText('Ошибка');
                            setTimeout(() => {
                                tg.MainButton.setText(originalText);
                                tg.MainButton.enable();
                            }, 1500);
                        });
                    });
                }
            } catch (_) {
                // ignore
            }
        }

        initTelegramMiniApp();

        updateUserProfile();

        document.getElementById('create-btn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            const resultSection = document.getElementById('result-section');
            const linkInput = document.getElementById('link-input');
            const linkInfo = document.getElementById('link-info');

            status.textContent = 'Создание ссылки...';
            status.className = 'status';
            resultSection.style.display = 'none';

            try {
                const response = await fetch('https://ezh-dev.ru:8000/create-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sost: selectedSost,
                        activate_count: selectedActivateCount,
                        admin_id: getCurrentUser()?.id,
                        admin_name: `${getCurrentUser()?.first_name || ''} ${getCurrentUser()?.last_name || ''}`.trim() || (getCurrentUser()?.username || ''),
                        admin_username: getCurrentUser()?.username
                    })
                });

                if (!response.ok) {
                    throw new Error('Ошибка при создании ссылки');
                }

                const data = await response.json();
                linkInput.value = data.link;
                lastCreatedLink = data.link;
                linkInfo.textContent = `Количество активаций: ${data.activate_count}, Состав: ${data.sost}`;
                resultSection.style.display = 'block';
                status.textContent = 'Ссылка создана успешно!';
                status.className = 'status success';

                if (tg?.MainButton) {
                    tg.MainButton.show();
                    tg.MainButton.enable();
                }
            } catch (error) {
                status.textContent = 'Ошибка: ' + error.message;
                status.className = 'status error';

                if (tg?.MainButton) {
                    tg.MainButton.hide();
                }
            }
        });

        document.getElementById('copy-btn').addEventListener('click', () => {
            const linkInput = document.getElementById('link-input');

            const value = linkInput.value;
            if (!value) return;

            if (tg?.Clipboard?.writeText) {
                tg.Clipboard.writeText(value);
                tg.showPopup({ message: 'Ссылка скопирована в буфер обмена!' });
                return;
            }

            navigator.clipboard.writeText(value).then(() => {
                alert('Ссылка скопирована в буфер обмена!');
            }).catch(err => {
                console.error('Ошибка копирования: ', err);
                alert('Не удалось скопировать ссылку');
            });
        });
    </script>
</body>
</html>
