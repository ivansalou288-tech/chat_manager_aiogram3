<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #b388ff;
            text-shadow: 0 0 20px #b388ff, 0 0 40px #7c4dff;
            margin-bottom: 50px;
            font-size: 2.5em;
        }
        .container {
            max-width: 1000px;            
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }
        .section-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 2px solid #7c4dff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(124, 77, 255, 0.3);
            transition: all 0.3s ease;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: inherit;
            width: 100%;
            height: 75px;
        }
        .section-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(124, 77, 255, 0.6);
            border-color: #b388ff;
        }
        .section-card.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        .section-title {
            font-size: 1.8em;
            color: #b388ff;
            text-shadow: 0 0 10px #b388ff;
            margin-bottom: 20px;
        }
        .btn {
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            border: 2px solid #b388ff;
            color: #fff;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(124, 77, 255, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(124, 77, 255, 0.7);
        }

        /* Стили профиля пользователя */
        .user-profile {
            position: fixed;
            top: 20px;
            right: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
        }

        .user-name {
            color: #fff;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .user-profile {
                top: 10px;
                right: 10px;
                padding: 6px 10px;
                gap: 8px;
            }

            .user-avatar {
                width: 30px;
                height: 30px;
            }

            .user-name {
                font-size: 0.8em;
                max-width: 100px;
            }
        }

    </style>
</head>
<body>
    <!-- Профиль пользователя -->
    <div id="userProfile" class="user-profile">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div id="userName" class="user-name"></div>
    </div>

    <h1>Главная страница</h1>
    <div class="container">
        <a href="users.html" class="section-card">
            <div class="section-title">Пользователи</div>
        </a>
        <a href="dks.html" class="section-card">
            <div class="section-title">Уровень команд</div>
        </a>
        <a href="recommendations.html" class="section-card">
            <div class="section-title">Рекомендации</div>
        </a>
        <a href="links.html" class="section-card">
            <div class="section-title">Создание ссылок</div>
        </a>
        <a href="all-links.html" class="section-card">
            <div class="section-title">Все ссылки</div>
        </a>
    </div>
    <script>
        (function () {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;

            try {
                tg.ready();
                tg.expand();
                if (tg.setHeaderColor) tg.setHeaderColor('#0a0a0a');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#0a0a0a');
                if (tg.BackButton) tg.BackButton.hide();
                if (tg.MainButton) tg.MainButton.hide();
            } catch (_) {
                // ignore
            }
        })();

        let currentUser = null;

        function getCurrentUser() {
            if (currentUser) return currentUser;
            const tg = window.Telegram?.WebApp;
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = {
                    id: tg.initDataUnsafe.user.id,
                    first_name: tg.initDataUnsafe.user.first_name,
                    last_name: tg.initDataUnsafe.user.last_name || '',
                    username: tg.initDataUnsafe.user.username || '',
                    photo_url: tg.initDataUnsafe.user.photo_url || ''
                };
            }
            return currentUser;
        }

        function updateUserProfile() {
            const user = getCurrentUser();
            if (!user) return;

            const profile = document.getElementById('userProfile');
            const avatar = document.getElementById('userAvatar');
            const name = document.getElementById('userName');

            const displayName = `${user.first_name} ${user.last_name}`.trim() || user.username;
            name.textContent = displayName;

            if (user.photo_url) {
                avatar.src = user.photo_url;
                avatar.style.display = 'block';
            } else {
                avatar.style.display = 'none';
            }

            profile.style.display = 'flex';
        }

        updateUserProfile();
    </script>
</body>
</html>
