<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рекомендации</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #050510;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #b388ff;
            text-shadow: 0 0 20px #b388ff, 0 0 40px #7c4dff;
            margin-bottom: 40px;
            font-size: 2.3em;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            border: 2px solid #b388ff;
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(124, 77, 255, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(124, 77, 255, 0.7);
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            gap: 25px;
            perspective: 1000px;
        }
        .neon-block {
            padding: 30px;
            border-radius: 18px;
            text-align: center;
            font-size: 1.4em;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(179, 136, 255, 0.32);
            box-shadow:
                0 0 0 1px rgba(124, 77, 255, 0.14),
                0 22px 48px rgba(0, 0, 0, 0.68),
                0 0 42px rgba(124, 77, 255, 0.34),
                0 0 78px rgba(179, 136, 255, 0.18);
            transform-style: preserve-3d;
            transform: translateZ(0);
            animation: float 4.8s ease-in-out infinite;
            transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease, border-color 0.25s ease;
        }
        .neon-block::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(179, 136, 255, 0.55), rgba(124, 77, 255, 0.15), rgba(179, 136, 255, 0.35));
            filter: blur(14px);
            opacity: 0.85;
            pointer-events: none;
        }
        .neon-block::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 18px;
            background:
                radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0) 45%),
                radial-gradient(circle at 80% 110%, rgba(124, 77, 255, 0.22), rgba(124, 77, 255, 0) 55%);
            box-shadow:
                inset 0 0 0 1px rgba(179, 136, 255, 0.26),
                inset 0 0 30px rgba(124, 77, 255, 0.08);
            pointer-events: none;
        }
        .neon-block span {
            color: #e9dcff;
            text-shadow:
                0 0 12px rgba(224, 195, 252, 0.7),
                0 0 22px rgba(179, 136, 255, 0.5),
                0 0 42px rgba(124, 77, 255, 0.28);
            position: relative;
            z-index: 1;
        }
        .neon-block:hover {
            transform: translateY(-10px) scale(1.03) rotateX(4deg);
            filter: brightness(1.1) saturate(1.08);
            border-color: rgba(224, 195, 252, 0.55);
            box-shadow:
                0 0 0 1px rgba(124, 77, 255, 0.2),
                0 30px 66px rgba(0, 0, 0, 0.74),
                0 0 58px rgba(124, 77, 255, 0.46),
                0 0 110px rgba(179, 136, 255, 0.22);
        }
        .neon-block:hover::before {
            opacity: 1;
        }
        .neon-remove { animation-delay: 0s; }
        .neon-recommend { animation-delay: 0.25s; }
        .neon-view-all { animation-delay: 0.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateZ(0); }
            50% { transform: translateY(-8px) translateZ(0); }
        }
        @media (prefers-reduced-motion: reduce) {
            .neon-block { animation: none; }
        }
        .neon-remove {
            background:
                radial-gradient(circle at 20% 20%, rgba(179, 136, 255, 0.22), rgba(179, 136, 255, 0) 55%),
                linear-gradient(135deg, rgba(64, 18, 92, 0.95), rgba(24, 16, 56, 0.95));
        }
        .neon-recommend {
            background:
                radial-gradient(circle at 20% 20%, rgba(124, 77, 255, 0.22), rgba(124, 77, 255, 0) 55%),
                linear-gradient(135deg, rgba(46, 24, 90, 0.95), rgba(15, 18, 52, 0.95));
        }
        .neon-view-all {
            background:
                radial-gradient(circle at 20% 20%, rgba(224, 195, 252, 0.16), rgba(224, 195, 252, 0) 55%),
                linear-gradient(135deg, rgba(78, 30, 112, 0.92), rgba(18, 14, 44, 0.96));
        }
        .subtitle {
            margin-top: 10px;
            font-size: 0.75em;
            opacity: 0.85;
            position: relative;
            z-index: 1;
        }

        /* Стили профиля пользователя */
        .user-profile {
            position: fixed;
            top: 20px;
            right: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
        }

        .user-name-profile {
            color: #fff;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .user-profile {
                top: 10px;
                right: 10px;
                padding: 6px 10px;
                gap: 8px;
            }

            .user-avatar {
                width: 30px;
                height: 30px;
            }

            .user-name-profile {
                font-size: 0.8em;
                max-width: 100px;
            }
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.92);
            border: 1px solid rgba(124, 77, 255, 0.55);
            box-shadow: 0 0 22px rgba(124, 77, 255, 0.22);
            color: #fff;
            padding: 12px 14px;
            border-radius: 14px;
            z-index: 2000;
            max-width: min(560px, calc(100vw - 24px));
            display: none;
            backdrop-filter: blur(10px);
        }

        .toast.error {
            border-color: rgba(255, 82, 82, 0.6);
            box-shadow: 0 0 22px rgba(255, 82, 82, 0.18);
        }

        .toast-title {
            font-weight: 800;
            margin-bottom: 6px;
            font-size: 0.95em;
        }

        .toast-text {
            opacity: 0.95;
            font-size: 0.9em;
            line-height: 1.35;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <!-- Профиль пользователя -->
    <div id="userProfile" class="user-profile">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div id="userName" class="user-name-profile"></div>
    </div>

    <div id="toast" class="toast error" role="status" aria-live="polite">
        <div class="toast-title">Ошибка</div>
        <div id="toastText" class="toast-text"></div>
    </div>

    <a href="index.html" class="back-btn">←</a>
    <h1>Рекомендации клана</h1>
    <div class="container">
        <a href="recommendations-all.html" style="text-decoration: none; color: inherit;">
            <div class="neon-block neon-view-all">
                <span>Все рекомендации клана</span>
            </div>
        </a>

        <a href="recommendations-add.html" style="text-decoration: none; color: inherit;">
            <div class="neon-block neon-recommend">
                <span>Рекомендовать</span>
            </div>
        </a>
        
        <a href="recommendations-remove.html" style="text-decoration: none; color: inherit;">
            <div class="neon-block neon-remove">
                <span>Снять рекомендацию</span>
            </div>
        </a>
    </div>
    <script>
        let toastTimer = null;
        function showError(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            if (!toast || !toastText) return;
            toastText.textContent = mapErrorToRu(message);
            toast.style.display = 'block';
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.style.display = 'none';
            }, 3500);
        }

        function mapErrorToRu(raw) {
            const msg = (raw || '').toString();
            const m = msg.toLowerCase();
            if (!m) return 'Произошла ошибка. Попробуйте ещё раз.';
            if (m.includes('access denied') || m.includes('403')) return 'Доступ запрещён. У вас нет прав.';
            if (m.includes('cannot') && m.includes('yourself')) return 'Нельзя выполнять это действие над собой.';
            if (m.includes('400')) return 'Некорректный запрос. Проверьте данные.';
            if (m.includes('500')) return 'Ошибка сервера. Попробуйте позже.';
            return msg;
        }

        (function () {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;

            try {
                tg.ready();
                tg.expand();
                if (tg.setHeaderColor) tg.setHeaderColor('#050510');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#050510');
                if (tg.BackButton) {
                    tg.BackButton.show();
                    tg.BackButton.onClick(() => {
                        const backBtn = document.querySelector('.back-btn');
                        if (backBtn) backBtn.click();
                    });
                }
                if (tg.MainButton) tg.MainButton.hide();
            } catch (_) {
                // ignore
            }
        })();

        let currentUser = null;

        function getCurrentUser() {
            if (currentUser) return currentUser;
            const tg = window.Telegram?.WebApp;
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = {
                    id: tg.initDataUnsafe.user.id,
                    first_name: tg.initDataUnsafe.user.first_name,
                    last_name: tg.initDataUnsafe.user.last_name || '',
                    username: tg.initDataUnsafe.user.username || '',
                    photo_url: tg.initDataUnsafe.user.photo_url || ''
                };
            }
            return currentUser;
        }

        function updateUserProfile() {
            const user = getCurrentUser();
            if (!user) return;

            const profile = document.getElementById('userProfile');
            const avatar = document.getElementById('userAvatar');
            const name = document.getElementById('userName');

            const displayName = `${user.first_name} ${user.last_name}`.trim() || user.username;
            name.textContent = displayName;

            if (user.photo_url) {
                avatar.src = user.photo_url;
                avatar.style.display = 'block';
            } else {
                avatar.style.display = 'none';
            }

            profile.style.display = 'flex';
        }

        updateUserProfile();
    </script>
</body>
</html>
