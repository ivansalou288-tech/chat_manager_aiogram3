<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Все рекомендации клана</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #b388ff;
            text-shadow: 0 0 20px #b388ff, 0 0 40px #7c4dff;
            margin-bottom: 30px;
            font-size: 2em;
        }
        #recoms {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            gap: 20px;
        }
        .rec-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 2px solid #7c4dff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(124, 77, 255, 0.3), inset 0 0 20px rgba(124, 77, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .rec-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(124, 77, 255, 0.6), inset 0 0 30px rgba(124, 77, 255, 0.2);
            border-color: #b388ff;
        }
        .rec-card.expanded {
            border-color: #81c784;
            box-shadow: 0 0 30px rgba(129, 199, 132, 0.6), inset 0 0 30px rgba(129, 199, 132, 0.2);
        }
        .rec-card.selected {
            border-color: #ff5252;
            box-shadow: 0 0 30px rgba(255, 82, 82, 0.55), inset 0 0 30px rgba(255, 82, 82, 0.18);
        }
        .rec-user {
            font-size: 1.2em;
            color: #b388ff;
            text-shadow: 0 0 10px #b388ff;
            margin-bottom: 10px;
        }
        .rec-position {
            font-weight: 700;
            color: #b388ff;
            font-size: 1.05em;
            margin-bottom: 6px;
        }
        .rec-reason {
            font-size: 0.9em;
            color: #d0d0e0;
            line-height: 1.4;
            margin-bottom: 6px;
        }
        .rec-expanded {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(179, 136, 255, 0.3);
            font-size: 0.85em;
            color: #a0a0b0;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.3s ease, opacity 0.3s ease;
        }
        .delete-btn {
            background: linear-gradient(145deg, #ff6b6b, #ff5252);
            border: 1px solid #ff5252;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85em;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        .delete-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(255, 82, 82, 0.8);
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            border: 2px solid #b388ff;
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(124, 77, 255, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(124, 77, 255, 0.7);
        }

        .form-status {
            margin-top: 12px;
            font-size: 0.95em;
            color: #b0b0c8;
            text-align: center;
        }

        .form-status.error {
            color: #ff6b6b;
        }

        .form-status.ok {
            color: #81c784;
        }

        .delete-panel {
            max-width: 1200px;
            margin: 0 auto 18px;
            display: none;
            gap: 12px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .delete-panel .delete-btn {
            margin-top: 0;
            padding: 10px 22px;
            font-size: 0.95em;
        }

        .closing {
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        /* Стили профиля пользователя */
        .user-profile {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
        }

        .user-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .user-name {
            color: #fff;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .user-profile {
                top: 10px;
                right: 10px;
                padding: 6px 10px;
                gap: 8px;
            }

            .user-avatar {
                width: 30px;
                height: 30px;
            }

            .user-name {
                font-size: 0.8em;
                max-width: 100px;
            }
        }
    </style>
</head>
<body>
    <!-- Профиль пользователя -->
    <div id="userProfile" class="user-profile">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div class="user-info">
            <div id="userName" class="user-name"></div>
        </div>
    </div>

    <a href="recommendations.html" class="back-btn">←</a>
    <h1>Все рекомендации клана</h1>
    <div id="deletePanel" class="delete-panel" style="display: flex;">
        <div id="deleteStatus" class="form-status"></div>
    </div>
    <div id="recoms"></div>

    <script>
        (function () {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;

            try {
                tg.ready();
                tg.expand();
                if (tg.setHeaderColor) tg.setHeaderColor('#0a0a0a');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#0a0a0a');
                if (tg.BackButton) {
                    tg.BackButton.show();
                    tg.BackButton.onClick(() => {
                        const backBtn = document.querySelector('.back-btn');
                        if (backBtn) backBtn.click();
                    });
                }
                if (tg.MainButton) tg.MainButton.hide();
            } catch (_) {
                // ignore
            }
        })();

        // Глобальная переменная для хранения данных пользователя
        let currentUser = null;

        // Функция для получения данных пользователя
        function getCurrentUser() {
            if (currentUser) return currentUser;
            
            const tg = window.Telegram?.WebApp;
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = {
                    id: tg.initDataUnsafe.user.id,
                    first_name: tg.initDataUnsafe.user.first_name,
                    last_name: tg.initDataUnsafe.user.last_name || '',
                    username: tg.initDataUnsafe.user.username || '',
                    language_code: tg.initDataUnsafe.user.language_code || 'ru',
                    photo_url: tg.initDataUnsafe.user.photo_url || ''
                };
                console.log('User data loaded:', currentUser);
                updateUserProfile();
            } else {
                console.warn('Telegram WebApp user data not available');
            }
            return currentUser;
        }

        // Функция для обновления профиля в интерфейсе
        function updateUserProfile() {
            const user = getCurrentUser();
            if (!user) return;

            const avatar = document.getElementById('userAvatar');
            const name = document.getElementById('userName');
            const profile = document.getElementById('userProfile');

            // Устанавливаем аватар
            if (user.photo_url) {
                avatar.src = user.photo_url;
            } else {
                // Если нет аватара, используем заглушку с инициалами
                const initials = (user.first_name[0] + (user.last_name[0] || '')).toUpperCase();
                avatar.style.display = 'none';
                
                // Создаем элемент с инициалами
                const initialsDiv = document.createElement('div');
                initialsDiv.className = 'user-avatar-initials';
                initialsDiv.textContent = initials;
                initialsDiv.style.cssText = `
                    width: 35px;
                    height: 35px;
                    border-radius: 50%;
                    background: linear-gradient(145deg, #7c4dff, #b388ff);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    color: white;
                    font-weight: bold;
                    font-size: 14px;
                    border: 2px solid #b388ff;
                    box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
                `;
                avatar.parentNode.insertBefore(initialsDiv, avatar);
            }

            // Устанавливаем имя
            const displayName = `${user.first_name} ${user.last_name}`.trim() || user.username;
            name.textContent = displayName;

            // Показываем профиль
            profile.style.display = 'flex';
        }

        // Инициализируем профиль пользователя
        getCurrentUser();

        let isDeleting = false;

        function renderRecoms(recoms) {
            document.getElementById('recoms').innerHTML = recoms.map(rec =>
                `<div class="rec-card" onclick="toggleExpand(this)">
                    <div class="rec-user">${rec.nik || 'без ника'} (@${rec.username || 'без username'})</div>
                    <div class="rec-position">На должность: ${rec.rang}</div>
                    <div class="rec-reason">${rec.reason}</div>
                    <div class="rec-expanded">
                        <div>Дата: ${rec.date}</div>
                        <div>Модератор: ${rec.moderLink ? `<a href="${rec.moderLink}" style="color: #81c784; text-decoration: none;">${rec.moderNick}</a>` : rec.moderNick}</div>
                        <div>ID: ${rec.rec_id}</div>
                        <button onclick="deleteRec(event, '${rec.rec_id}', '${rec.user_id}')" class="delete-btn">Удалить</button>
                    </div>
                </div>`
            ).join('');
        }

        function toggleExpand(card) {
            // Collapse all other expanded cards
            document.querySelectorAll('.rec-card.expanded').forEach(c => {
                if (c !== card) {
                    c.classList.remove('expanded');
                    const exp = c.querySelector('.rec-expanded');
                    exp.style.maxHeight = '0';
                    exp.style.opacity = '0';
                }
            });
            // Toggle the current card
            const exp = card.querySelector('.rec-expanded');
            if (card.classList.contains('expanded')) {
                card.classList.remove('expanded');
                exp.style.maxHeight = '0';
                exp.style.opacity = '0';
            } else {
                card.classList.add('expanded');
                exp.style.maxHeight = '250px';
                exp.style.opacity = '1';
            }
        }

        async function deleteRec(e, recId, userId) {
            e.stopPropagation();
            const status = document.getElementById('deleteStatus');
            status.textContent = '';
            status.className = 'form-status';

            const user = getCurrentUser();
            if (!user) {
                status.textContent = 'Ошибка: не удалось получить данные пользователя';
                status.classList.add('error');
                return;
            }

            isDeleting = true;
            try {
                const payload = { 
                    rec_id: recId, 
                    user_id: userId,
                    admin_id: user.id,
                    admin_name: `${user.first_name} ${user.last_name}`.trim() || user.username
                };
                const r = await fetch('https://ezh-dev.ru:8000/recom-remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!r.ok) {
                    const text = await r.text().catch(() => '');
                    status.textContent = 'Не удалось удалить рекомендацию.' + (text ? ` (${text})` : '');
                    status.classList.add('error');
                    return;
                }

                status.textContent = '✓';
                status.classList.add('ok');
                status.style.fontSize = '2em';
                status.style.marginTop = '0';
                status.style.marginBottom = '10px';
                setTimeout(() => {
                    location.reload();
                }, 350);
            } catch (err) {
                status.textContent = 'Не удалось удалить рекомендацию.';
                status.classList.add('error');
            } finally {
                isDeleting = false;
                setTimeout(() => {
                    status.style.fontSize = '0.95em';
                }, 600);
            }
        }

        async function loadRecommendations() {
            try {
                const [recomRes, usersRes] = await Promise.all([
                    fetch('https://ezh-dev.ru:8000/recom-clan/klan'),
                    fetch('https://ezh-dev.ru:8000/users/klan')
                ]);
                const recoms = await recomRes.json();
                const usersObj = await usersRes.json();
                const users = Object.values(usersObj);

                // Map user info to recommendations
                recoms.forEach(rec => {
                    const user = users.find(u => u.tg_ids == rec.user_id);
                    if (user) {
                        rec.username = user.username || 'без username';
                        rec.nik = user.nik_pubg || user.nik || 'без ника';
                    } else {
                        rec.username = 'без username';
                        rec.nik = 'без ника';
                    }
                    // Handle moderator
                    if (!isNaN(parseInt(rec.moder))) {
                        const moderUser = users.find(u => u.tg_ids == rec.moder);
                        if (moderUser) {
                            rec.moderNick = moderUser.nik_pubg || moderUser.nik || moderUser.username || 'Модератор';
                            rec.moderLink = `user-detail.html?chat=klan&id=${rec.moder}`;
                        } else {
                            rec.moderNick = rec.moder;
                        }
                    } else {
                        rec.moderNick = rec.moder;
                    }
                });

                renderRecoms(recoms);
            } catch (err) {
                console.error('Ошибка загрузки данных:', err);
                document.getElementById('recoms').innerHTML = '<div style="color: #ff6b6b; text-align: center; padding: 50px;">Не удалось загрузить рекомендации.</div>';
            }
        }

        loadRecommendations();
    </script>
</body>
</html>
