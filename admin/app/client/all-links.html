<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Все ссылки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #b388ff;
            text-shadow: 0 0 20px #b388ff, 0 0 40px #7c4dff;
            margin-bottom: 50px;
            font-size: 2.5em;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            border: 2px solid #b388ff;
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(124, 77, 255, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(124, 77, 255, 0.7);
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .links-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(124, 77, 255, 0.3);
        }
        .links-table th, .links-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #7c4dff;
            border-right: 1px solid #7c4dff;
        }
        .links-table th:last-child, .links-table td:last-child {
            border-right: none;
        }
        .links-table th {
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            color: #050510;
            font-weight: bold;
        }
        .links-table tr:nth-child(even) {
            background: rgba(124, 77, 255, 0.05);
        }
        .links-table tr:hover {
            background: rgba(124, 77, 255, 0.1);
        }
        .links-table tr.clickable {
            cursor: pointer;
        }
        .no-links {
            text-align: center;
            color: #999;
            padding: 50px;
            font-size: 1.2em;
        }
        .copy-btn {
            background: linear-gradient(145deg, #7c4dff, #b388ff);
            border: 2px solid #b388ff;
            color: #fff;
            padding: 3px 6px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px #b388ff, 0 0 10px #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.5), 0 0 20px rgba(179, 136, 255, 0.3);
        }
        .copy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(124, 77, 255, 0.5), 0 0 25px rgba(179, 136, 255, 0.7);
            text-shadow: 0 0 8px #b388ff, 0 0 15px #b388ff;
        }
        .delete-btn {
            background: linear-gradient(145deg, #ff5252, #ff1744);
            border: 2px solid #ff5252;
            color: #fff;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        .delete-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 82, 82, 0.5);
        }
        .sub-row {
            background: rgba(255, 82, 82, 0.1);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            opacity: 0;
            will-change: max-height, opacity;
        }
        .sub-row td {
            padding: 10px 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">←</a>
    <h1>Все ссылки</h1>
    <div class="container">
        <table class="links-table">
            <thead>
                <tr>
                    <th>Ссылка</th>
                    <th>Кол-во активаций</th>
                    <th>Состав</th>
                </tr>
            </thead>
            <tbody id="links-tbody">
                <!-- Links will be loaded here -->
            </tbody>
        </table>
    </div>

    <script>
        let currentExpanded = null;

        async function loadLinks() {
            try {
                const response = await fetch('https://ezh-dev.ru:8000/all-links');
                if (!response.ok) {
                    throw new Error('Ошибка загрузки ссылок');
                }
                const links = await response.json();
                const tbody = document.getElementById('links-tbody');
                if (links.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="no-links">Ссылок нет</td></tr>';
                    return;
                }
                tbody.innerHTML = links.map(link => `
                    <tr class="clickable" data-link="${link.link}">
                        <td>
                            <code style="margin-right: 5px;">${link.link}</code><button class="copy-btn" onclick="copyToClipboard('${link.link}')">Копировать</button>
                        </td>
                        <td>${link.activate_count}</td>
                        <td>${link.sost}</td>
                    </tr>
                `).join('');
                
                // Add event listeners for row clicks
                document.querySelectorAll('.clickable').forEach(tr => {
                    tr.addEventListener('click', (e) => {
                        if (e.target.closest('.copy-btn')) return;
                        const link = tr.dataset.link;
                        
                        // Close previously expanded row
                        if (currentExpanded && currentExpanded !== tr) {
                            const prevNext = currentExpanded.nextElementSibling;
                            if (prevNext && prevNext.classList.contains('sub-row')) {
                                prevNext.style.maxHeight = '0';
                                prevNext.style.opacity = '0';
                                setTimeout(() => prevNext.remove(), 700);
                            }
                        }
                        
                        const next = tr.nextElementSibling;
                        if (next && next.classList.contains('sub-row')) {
                            next.style.maxHeight = '0';
                            next.style.opacity = '0';
                            setTimeout(() => next.remove(), 700);
                            currentExpanded = null;
                        } else {
                            const subRow = document.createElement('tr');
                            subRow.className = 'sub-row';
                            subRow.innerHTML = `<td colspan="3"><button class="delete-btn" onclick="deleteLink('${link}', this)">Удалить ссылку</button></td>`;
                            tr.parentNode.insertBefore(subRow, tr.nextSibling);
                            setTimeout(() => {
                                subRow.style.maxHeight = '60px';
                                subRow.style.opacity = '1';
                            }, 0);
                            currentExpanded = tr;
                        }
                    });
                });
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('links-tbody').innerHTML = '<tr><td colspan="3" class="no-links">Ошибка загрузки ссылок</td></tr>';
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Ссылка скопирована!');
            }).catch(err => {
                console.error('Ошибка копирования:', err);
                alert('Не удалось скопировать');
            });
        }

        function deleteLink(link, btn) {
            fetch('https://ezh-dev.ru:8000/delete-link', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ link })
            }).then(() => {
                const subRow = btn.closest('tr');
                const mainRow = subRow.previousElementSibling;
                subRow.remove();
                mainRow.remove();
            }).catch(err => {
                console.error('Ошибка удаления:', err);
                alert('Не удалось удалить ссылку');
            });
        }

        loadLinks();
    </script>
</body>
</html>
